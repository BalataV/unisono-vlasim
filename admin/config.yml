backend:
  name: git-gateway
  branch: main

# Media files
media_folder: "images/uploads"
public_folder: "/images/uploads"

# Locale
locale: "cs"

# Collections
collections:
  # Events / Akce
  - name: "events"
    label: "Akce / Events"
    files:
      - label: "Seznam akcí"
        name: "events"
        file: "content/events.json"
        fields:
          - label: "Akce"
            name: "events"
            widget: "list"
            fields:
              - { label: "Název akce", name: "title", widget: "string" }
              - { label: "Datum", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD.MM.YYYY", picker_utc: true }
              - { label: "Čas", name: "time", widget: "string", default: "20:00" }
              - { label: "Místo", name: "location", widget: "string" }
              - { label: "Popis", name: "description", widget: "text", required: false }

  # Gallery / Galerie
  - name: "gallery"
    label: "Galerie / Gallery"
    files:
      - label: "Fotogalerie"
        name: "gallery"
        file: "content/gallery.json"
        fields:
          - label: "Fotky"
            name: "photos"
            widget: "list"
            fields:
              - { label: "Název", name: "title", widget: "string" }
              - { label: "Obrázek", name: "image", widget: "image" }
              - { label: "Popis", name: "description", widget: "text", required: false }

  # Site Settings / Nastavení webu
  - name: "settings"
    label: "Nastavení webu"
    files:
      - label: "O kapele"
        name: "about"
        file: "content/about.json"
        fields:
          - { label: "O nás (CZ)", name: "about_cs", widget: "markdown" }
          - { label: "O nás (EN)", name: "about_en", widget: "markdown" }
          - { label: "Fotka kapely", name: "band_photo", widget: "image", required: false }

      - label: "Kontaktní údaje"
        name: "contact"
        file: "content/contact.json"
        fields:
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Telefon", name: "phone", widget: "string", required: false }
          - { label: "Facebook", name: "facebook", widget: "string", required: false }
          - { label: "Instagram", name: "instagram", widget: "string", required: false }
          - { label: "YouTube", name: "youtube", widget: "string", required: false }
